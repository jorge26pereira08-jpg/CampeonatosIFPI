{% extends 'base.html' %}
{% block title %}Login — IFPI Sports{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-box">
    <div class="auth-header">
      <div class="auth-logo">🏆</div>
      <h1>Bem-vindo!</h1>
      <p>Acesse sua conta para continuar</p>
    </div>

    <form method="POST">
      <div class="form-group">
        <label class="form-label" for="username">👤 Usuário</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="Seu nome de usuário" required autofocus>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">🔒 Senha</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Sua senha" required>
      </div>

      <div class="form-actions" style="margin-top: 1.5rem;">
        <button type="submit" class="btn btn-primary btn-block" style="width: 100%;">🚀 Entrar no Sistema</button>
      </div>
    </form>

    <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--gray-200); padding-top: 1.5rem;">
      <p style="font-size: 0.9rem; color: var(--gray-700);">Ainda não tem conta? <a href="{{ url_for('cadastro') }}" style="color: var(--ifpi-green); font-weight: 700;">Cadastre-se</a></p>
      <p style="font-size: 0.85rem; margin-top: 0.5rem;"><a href="{{ url_for('recuperar_senha') }}" style="color: var(--gray-500);">Esqueceu sua senha?</a></p>
    </div>
  </div>
</div>
{% endblock %}
